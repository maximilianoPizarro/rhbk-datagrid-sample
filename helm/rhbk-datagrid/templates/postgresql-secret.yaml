{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rhbk-datagrid.postgresql" . }}
  labels:
    {{- include "rhbk-datagrid.postgresqlLabels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRESQL_USER: {{ .Values.postgresql.credentials.username | quote }}
  POSTGRESQL_PASSWORD: {{ .Values.postgresql.credentials.password | quote }}
  POSTGRESQL_DATABASE: {{ .Values.postgresql.credentials.database | quote }}
{{- end }}
