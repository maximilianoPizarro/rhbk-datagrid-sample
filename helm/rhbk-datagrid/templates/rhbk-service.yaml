apiVersion: v1
kind: Service
metadata:
  name: {{ include "rhbk-datagrid.rhbk" . }}
  labels:
    {{- include "rhbk-datagrid.rhbkLabels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.httpsPort }}
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "rhbk-datagrid.rhbkSelectorLabels" . | nindent 4 }}
