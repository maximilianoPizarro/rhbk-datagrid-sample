apiVersion: v2
name: rhbk-datagrid
description: >-
  Red Hat Build of Keycloak (RHBK) High Availability deployment with
  Red Hat Data Grid as external distributed cache and PostgreSQL.
  Deploys 2 RHBK instances clustered via JGroups (jdbc-ping) backed
  by an external Data Grid for session persistence.
type: application
version: 1.0.0
appVersion: "26"
keywords:
  - keycloak
  - rhbk
  - datagrid
  - infinispan
  - high-availability
  - jgroups
  - sso
  - openshift
icon: https://www.keycloak.org/resources/images/logo.svg
home: https://github.com/maximilianoPizarro/rhbk-datagrid-sample
sources:
  - https://github.com/maximilianoPizarro/rhbk-datagrid-sample
maintainers:
